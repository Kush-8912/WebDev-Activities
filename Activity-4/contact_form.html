<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create a Contact Form</title>
</head>
<body>
<h1><b>Contact Us</b></h1>
<form>
<label><b>Name:</b>
<br>
<input type="text" name="name" placeholder="Enter your name" required>
</label>
<br><br><br><br>
<label><b>Email:</b>
<br>
<input type="email" name="email" placeholder="Enter your email" required>
</label>
<br><br><br><br>
<label><b>Phone Number:</b>
<br>
<input type="tel" name="mobile" placeholder="Enter your mobile number" required>
</label>
<br><br><br><br>
<label><b>Subject:</b>
<br>
<input type="text" name="subject" placeholder="Enter your subject" required>
</label>
<br><br><br><br>
<label><b>Message:</b>
<textarea name="message" rows="4" cols="30" placeholder="Enter your message" required></textarea>
</label>
<br><br><br><br>
<label>
<input type="checkbox" name="subscribe" required> <b>Subscribe to our newsletter</b>
</label>
<br><br><br><br>
<button type="submit"><b>Submit</b></button>
</form>
</body>
</html>
