<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon-Orbit Activity</title>
<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-color:black;
}
.container{
position:relative;
height:400px;
width:400px;
border-radius:50%;
animation-name:orbit;
animation-duration:20s;
animation-iteration-count:infinite;
}
.earth{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
height:100px;
width:100px;
border-radius:50%;
background-color:blue;
box-shadow:0 0 30px 10px rgba(0,0,255,0.5);
}
.moon{
position:absolute;
top:0px;
background-color:grey;
height:30px;
width:30px;
border-radius:50%;
box-shadow:0 0 20px 5px rgba(255,255,255,0.5);
}
@keyframes orbit{
0%{
transform:rotate(0deg);
}
100%{
transform:rotate(360deg);
}
}
</style>
</head>
<body>
<div class = "container">
<div class = "earth"></div>
<div class = "moon"></div>
</div>
</body>
</html>
